<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idle Clicker Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Viral Clicker</h1>
    <div id="score-container">Coins: <span id="score">0</span></div>
    <div id="cps-container">Coins per second: <span id="cps">0</span></div>
    <div id="prestige-container">Prestige Level: <span id="prestige">0</span></div>
    <button id="prestige-btn" disabled>Prestige (reset for bonus)</button>
    <button id="click-btn">Click me!</button>

    <h2>Upgrades</h2>
    <div id="shop"></div>

    <div id="achievement-container">
        <h2>Achievements</h2>
        <ul id="achievements"></ul>
    </div>

    <button id="reset-btn">Reset Game</button>

    <script src="script.js"></script>
</body>
</html>
